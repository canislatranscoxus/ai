reading_task:
  description: >
    Review these personal study notes provided by the student:
    ---
    {document_text}
    ---
    Identify and the main ideas of the lesson, core concepts, and key definitions 
    found in these notes so we can build a study guide.
  expected_output: >
    A detailed list of the academic concepts, important ideas from the lesson, and fable and vocabulary found in the notes.
  agent: txt_reader

summarizing_task:
  description: >
    Take the list of concepts from the previous step and organize them into 
    a concise study overview (2-4 paragraphs) highlighting the most important facts.
    So the student can understand the most important points.
  expected_output: >
    A structured study summary formatted in markdown.
  agent: summarizer
  context:
    - reading_task
  output_file: /app/config/summary.md





quiz_task:
  description: >
    Using the summary of the TXT's content, create a quiz with multiple-choice questions that test understanding of the main concepts.
    Provide say, 5 multiple-choice questions. Each question should have 4 options and indicate the correct answers.
  expected_output: >
    A quiz with 5 multiple-choice questions and their correct answers.
  agent: quiz_maker
  context:
    - summarizing_task
  output_file: /app/config/quiz.md

user_test_task:
  description: >
    Present the quiz questions to the user and ask them to provide their answers.
    After the user responds, check the correctness and provide a final score.
  expected_output: >
    A summary of user performance, e.g. "You answered X out of Y questions correctly."
  agent: study_buddy
  context:
    - quiz_task
  human_input: true


flashcard_task:
  description: >
    Using the summary of the TXT's content, create 5 flashcards. Each card has a "front" 
    ( question or term ) and a "back" ( explanation ).
  expected_output: >
    A structured list or text specifying each flashcard's front and back.
  agent: flashcard_maker
  context:
    - summarizing_task
  output_file: /app/config/flashcards.txt

study_flashcard_task:
  description: >
    Go through the flashcards one by one with the user. The user can type "show" to display a card's front,
    and "flip" to reveal its back, or "quit" to exit.
  expected_output: >
    Interactive session with the user. No final text is required, just user engagement.
  agent: study_buddy
  context:
    - flashcard_task
  human_input: true
